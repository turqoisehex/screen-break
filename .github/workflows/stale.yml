name: Stale Issues

on:
  schedule:
    - cron: '0 6 * * *'

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            activity in 60 days. It will be closed in 14 days if no further activity occurs.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has not had
            activity in 30 days. It will be closed in 14 days if no further activity occurs.
          close-issue-message: >
            This issue was closed because it has been stale for 14 days with no activity.
            Feel free to reopen if this is still relevant.
          days-before-issue-stale: 60
          days-before-pr-stale: 30
          days-before-issue-close: 14
          days-before-pr-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security,good first issue
          exempt-pr-labels: pinned,security
